name: Release

# Triggered by pushing a tag like `v0.2.0` — see scripts/tag-release.sh, which
# derives that tag from Cargo.toml's `version` so the two never drift apart.
# workflow_dispatch is just for manually re-running against an existing tag
# (e.g. retrying a flaky matrix leg) without re-tagging.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to run (macos/linux/windows)'
        required: false
        default: ''
      arch:
        description: 'Architecture to run (amd64/arm64)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Linux legs build inside an old-base container (see matrix.container)
    # so the glibc/library floor baked into flick stays forward-compatible
    # with older user systems, independent of whatever glibc the *host*
    # runner itself ships. "" means "no container" — GitHub Actions treats
    # an empty image name that way.
    #
    # mpv itself no longer depends on this container's apt archive at all:
    # scripts/mpv-linux-static-build.sh builds a pinned mpv/ffmpeg/libass/
    # libplacebo from source and statically links it into the flick binary
    # (see build.rs's link_mpv_static_linux), specifically so the target
    # machine's own libmpv — whatever version or build that happens to be,
    # or whether it's installed at all — can no longer cause the
    # "VersionMismatch" failure that motivated this (libmpv2-sys hardcodes
    # MPV_CLIENT_API_MAJOR=2 and rejects any other major version reported
    # by a *dynamically* loaded libmpv at runtime; static linking removes
    # that runtime dependency entirely). ubuntu:22.04 is kept as the
    # container base purely for the glibc floor below, not for mpv's sake.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: arm64
            runner: macos-14
            container: ""
          - platform: macos
            arch: amd64
            runner: macos-15-intel
            container: ""
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
            container: "ubuntu:22.04"
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: "ubuntu:22.04"
          - platform: windows
            arch: amd64
            runner: windows-latest
            container: ""
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            container: ""
    steps:
      # ubuntu:22.04 is a bare image — no git/curl/compiler until we install
      # them. Must run before Checkout, since that needs git. No `mpv`/
      # `libmpv-dev` here anymore — scripts/mpv-linux-static-build.sh builds
      # mpv from source instead (see the container comment above), so this
      # only needs: build tooling for that script, and -dev headers for the
      # handful of libraries that stay dynamically linked (X11/EGL/GL, ALSA/
      # PulseAudio/PipeWire, VAAPI/VDPAU — display/audio-server client libs
      # that must match the *host*, not the build machine, same rule
      # Packager.toml already applies to libpipewire).
      - name: Bootstrap container build environment
        if: matrix.platform == 'linux'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl git build-essential pkg-config perl ca-certificates \
            libssl-dev libfontconfig1-dev libfuse2 file \
            nasm cmake autoconf automake libtool python3 python3-pip ninja-build \
            zlib1g-dev libharfbuzz-dev libfribidi-dev libfreetype-dev libfontconfig-dev \
            libx11-dev libwayland-dev libegl1-mesa-dev libgl1-mesa-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libdrm-dev libva-dev libvdpau-dev
          # Ubuntu 22.04's apt meson is 0.61.2; mpv 0.41.0 requires >=1.3.0.
          pip3 install --quiet 'meson>=1.3.0'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          # -v2 suffix busts a stale Linux cache whose target/ contained a
          # flick binary linked against libmpv.so.1 (apt's legacy runtime
          # lib) instead of .so.2 — Cargo had no way to detect that the
          # *system* libmpv.so target had moved on since that cache was
          # first populated, so it kept skipping relinking and CI kept
          # repackaging the stale .so.1-linked binary release after
          # release, surfacing as "VersionMismatch" at runtime. Bump this
          # suffix again if a similar staleness issue ever recurs. This
          # specific incident class can no longer recur on Linux now that
          # mpv is statically linked from a pinned source build rather than
          # resolved against the container's system libmpv at build time.
          key: ${{ matrix.platform }}-${{ matrix.arch }}-v2

      # Builds ffmpeg/libass/libplacebo/mpv from source (~15-30 min cold).
      # Cache key hashes the version-pins file, so a routine release with no
      # version bump restores instantly; bumping any pinned version rebuilds
      # once, then is cached again under the new key.
      - name: Cache static mpv build
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: third_party/mpv-linux-static-${{ matrix.arch }}
          key: mpv-static-${{ matrix.arch }}-${{ hashFiles('scripts/mpv-linux-static-versions.txt') }}-v1

      - name: Build static mpv (Linux)
        if: matrix.platform == 'linux'
        run: ./scripts/mpv-linux-static-build.sh

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "VERSION=$CARGO_VERSION" >> "$GITHUB_ENV"

      - name: Sync Packager.toml version
        shell: bash
        run: perl -i -pe "s/^version = .*/version = \"$VERSION\"/" Packager.toml

      - name: Install macOS build deps
        if: matrix.platform == 'macos'
        run: brew install mpv pkg-config dylibbundler

      - name: Install cargo-packager
        run: cargo install --locked cargo-packager

      - name: Install Windows build deps
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: ./scripts/package-macos.sh

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/package-linux.sh

      - name: Download and Extract libmpv
        if: matrix.platform == 'windows'
        shell: bash
        env:
          MPV_ARCH: ${{ matrix.arch }}
        run: ./scripts/mpv-windows-setup.sh

      - name: Set LIBCLANG_PATH
        if: matrix.platform == 'windows'
        shell: pwsh
        # Pin to the runner image's system-wide LLVM install rather than
        # relying on clang-sys auto-detection — windows-latest also ships a
        # second, VS-bundled clang, and letting clang-sys pick between the
        # two has caused it to resolve a mismatched libclang version before
        # (see actions/runner-images#12435).
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -Encoding utf8 -Append -FilePath $env:GITHUB_ENV

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          MPV_ARCH: ${{ matrix.arch }}
        run: ./scripts/package-windows.ps1

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp dist/*.dmg "out/Flick-${{ matrix.arch }}.dmg"
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            cp dist/*.deb "out/Flick-${{ matrix.arch }}.deb"
            cp dist/*.AppImage "out/Flick-${{ matrix.arch }}.AppImage"
          else
            cp dist/*-setup.exe "out/Flick-${{ matrix.arch }}-setup.exe"
          fi
          ls -la out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flick-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*

  publish-apt:
    name: Publish apt repository
    needs: package
    runs-on: ubuntu-latest
    # Overrides (not merges) the contents:write granted at the workflow
    # level above — this job only needs to mint an OIDC token to assume
    # the AWS role; it never touches the GitHub release itself.
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: us-east-2
      S3_BUCKET: apt.flick.free
      CLOUDFRONT_DISTRIBUTION_ID: ECXQ4DRLRKBT9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: flick-linux-*
          path: deb-artifacts
          merge-multiple: true

      - name: Install apt repo tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg-dev gnupg

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          FPR="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/ {print $10; exit}')"
          echo "GPG_KEY_FPR=$FPR" >> "$GITHUB_ENV"

      # role-to-assume requires this job's id-token: write permission above;
      # the role must trust the GitHub OIDC provider for this repo and grant
      # s3:GetObject/PutObject/ListBucket/DeleteObject on $S3_BUCKET plus
      # cloudfront:CreateInvalidation on $CLOUDFRONT_DISTRIBUTION_ID.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::596319333022:role/github-actions-flick-apt-s3
          aws-region: ${{ env.AWS_REGION }}

      - name: Build, sign, and publish apt repo
        env:
          DEB_DIR: ${{ github.workspace }}/deb-artifacts
          GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: ./scripts/publish-apt.sh

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/dists/*" "/pubkey.gpg"
