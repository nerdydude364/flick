name: Release

# Triggered by pushing a tag like `v0.2.0` — see scripts/tag-release.sh, which
# derives that tag from Cargo.toml's `version` so the two never drift apart.
# workflow_dispatch is just for manually re-running against an existing tag
# (e.g. retrying a flaky matrix leg) without re-tagging.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Linux legs build inside an old-base container (see matrix.container)
    # so the glibc/library floor baked into flick and mpv's bundled .so deps
    # stays forward-compatible with older user systems, independent of
    # whatever glibc the *host* runner itself ships. "" means "no container"
    # — GitHub Actions treats an empty image name that way.
    #
    # Container is ubuntu:22.04, not something older like 20.04: the
    # libmpv2 crate hardcodes MPV_CLIENT_API_MAJOR=2 and rejects any mpv
    # reporting a different major client API version (this is the
    # VersionMismatch bug from the libmpv.so.1 cache-staleness incident).
    # mpv didn't bump to API major 2 until 0.35.0; Ubuntu 20.04's archive
    # only has 0.32.0, so building there breaks at startup every time, not
    # just a glibc problem. 22.04's archive has since picked up a 0.38.0
    # backport (the libmpv2 package) that does satisfy the check, making
    # it the oldest distro this project can currently build against.
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            arch: arm64
            runner: macos-14
            container: ""
          - platform: macos
            arch: amd64
            runner: macos-15-intel
            container: ""
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
            container: "ubuntu:22.04"
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            container: "ubuntu:22.04"
          - platform: windows
            arch: amd64
            runner: windows-latest
            container: ""
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            container: ""
    steps:
      # ubuntu:22.04 is a bare image — no git/curl/compiler/mpv until we
      # install them. Must run before Checkout, since that needs git.
      - name: Bootstrap container build environment
        if: matrix.platform == 'linux'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl git build-essential pkg-config perl ca-certificates \
            libssl-dev mpv libmpv-dev libfuse2

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          # -v2 suffix busts a stale Linux cache whose target/ contained a
          # flick binary linked against libmpv.so.1 (apt's legacy runtime
          # lib) instead of .so.2 — Cargo had no way to detect that the
          # *system* libmpv.so target had moved on since that cache was
          # first populated, so it kept skipping relinking and CI kept
          # repackaging the stale .so.1-linked binary release after
          # release, surfacing as "VersionMismatch" at runtime. Bump this
          # suffix again if a similar staleness issue ever recurs.
          key: ${{ matrix.platform }}-${{ matrix.arch }}-v2

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VERSION="$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "VERSION=$CARGO_VERSION" >> "$GITHUB_ENV"

      - name: Sync Packager.toml version
        shell: bash
        run: perl -i -pe "s/^version = .*/version = \"$VERSION\"/" Packager.toml

      - name: Install macOS build deps
        if: matrix.platform == 'macos'
        run: brew install mpv pkg-config dylibbundler

      - name: Install cargo-packager
        run: cargo install --locked cargo-packager

      - name: Package (macOS)
        if: matrix.platform == 'macos'
        run: ./scripts/package-macos.sh

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/package-linux.sh

      - name: Download and Extract libmpv
        shell: pwsh
        run: |
          # 1. Fetch latest release data from GitHub API
          $ReleaseInfo = Invoke-RestMethod -Uri "https://github.com"
          
          # 2. Extract the browser download URL for the dev-x86_64 build package
          $DownloadUrl = $ReleaseInfo.assets | Where-Object { $_.name -like "mpv-dev-x86_64-2*.7z" } | Select-Object -ExpandProperty browser_download_url
          Write-Host "Found URL: $DownloadUrl"

          # 3. Download the actual valid archive file
          Invoke-WebRequest -Uri $DownloadUrl -OutFile "mpv-dev.7z"
          
          # 4. Extract and copy files safely
          7z x mpv-dev.7z -o"mpv-extracted"
          New-Item -ItemType Directory -Force -Path "C:\mpv"
          Copy-Item -Path "mpv-extracted\libmpv-2.dll" -Destination "C:\mpv\libmpv-2.dll"
          Copy-Item -Path "mpv-extracted\mpv.lib" -Destination "C:\mpv\mpv.lib"

      - name: Set libmpv Environment Variables
        if: matrix.platform == 'windows'
        run: |
          echo "MPV_SOURCE=C:\mpv" | Out-File -Encoding utf8 -Append -FilePath $env:GITHUB_ENV
          echo "LIBCLANG_PATH=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin" | Out-File -Encoding utf8 -Append -FilePath $env:GITHUB_ENV

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          MPV_ARCH: ${{ matrix.arch }}
        run: ./scripts/package-windows.ps1

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp dist/*.dmg "out/Flick-${{ matrix.arch }}.dmg"
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            cp dist/*.deb "out/Flick-${{ matrix.arch }}.deb"
            cp dist/*.AppImage "out/Flick-${{ matrix.arch }}.AppImage"
          else
            cp dist/*-setup.exe "out/Flick-${{ matrix.arch }}-setup.exe"
          fi
          ls -la out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flick-${{ matrix.platform }}-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create/update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
